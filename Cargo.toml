[package]
name = "simulation_worker"
version = "0.1.0"
edition = "2024"

[lib]
name = "simulation_worker"
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0.102"
pyo3 = { git = "https://github.com/pyo3/pyo3", version = "0.28.2" }
wasmtime = "42.0.1"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
debug = 0
